[bar]
order = ["main"]

    [bar.main]
    position = "top"
    thickness = 40
    shadow = false
    panel_overlap = 0
    radius = 0
    margin_ends = 0
    margin_edge = 0
    padding = 20
    widget_spacing = 10
    scale = 1.1

    start  = ["launcher", "wallpaper", "workspaces"]
    center = ["clock"]
    end    = ["media", "tray", "notifications", "clipboard", "network", "bluetooth", "volume", "brightness", "battery", "control-center", "session"]

# Logitech G Pro mouse
[battery.device."/org/freedesktop/UPower/devices/battery_hidpp_battery_0"]
warning_threshold = 10

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-1", "clock", "weather" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 1280.0
    cy = 1317.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.clock]
    type       = "clock"
    output     = "DP-1"
    cx         = 1280.0
    cy         = 600.0
    box_width  = 0.0
    box_height = 0.0
    rotation   = 0.0

        [lockscreen_widgets.widget.clock.settings]
        format           = "{:%H:%M}"
        shadow           = true
        background       = false
        center_text      = true


    [lockscreen_widgets.widget.weather]
    type       = "weather"
    output     = "DP-1"
    cx         = 1280.0
    cy         = 730.0
    box_width  = 0.0
    box_height = 0.0
    rotation   = 0.0

        [lockscreen_widgets.widget.weather.settings]
        color              = "on_surface"
        show_forecast      = false
        background         = false


[shell]
avatar_path           = "~/Pictures/Sunyata.webp"
telemetry_enabled     = false

    [shell.screenshot]
    save_to_file      = false
    directory         = "~/Pictures/Screenshots"
    filename_pattern  = "screenshot_%Y%m%d_%H%M%S"
    copy_to_clipboard = true
    freeze_screen     = true
    pipe_to_command   = false
    pipe_command      = "swappy -f -"

    [shell.panel]
    launcher_categories = false

[location]
auto_locate = true

[weather]
enabled         = true
refresh_minutes = 30
unit            = "metric"
effects         = true

[audio]
enable_overdrive     = false  # allow volume sliders above 100% (up to 150%)
enable_sounds        = false   # master toggle for UI sounds
#sound_volume         = 0.5    # global sound volume (0.0 - 1.0)
volume_change_sound  = ""     # empty = bundled default sounds/volume-change.wav
notification_sound   = ""     # empty = bundled default sounds/notification.wav

[idle]
pre_action_fade_seconds = 2.0

[idle.behavior.lock]
enabled = true
action = "lock"
timeout = 600

[theme]
source = "wallpaper"

    [theme.templates]
    enable_builtin_templates = true
    builtin_ids = [ "qt", "gtk4", "gtk3" ]

[wallpaper]
directory = "/home/skykanin/Pictures/wallpapers"

    [wallpaper.default]
    path = "/home/skykanin/Pictures/wallpapers/planets.jpg"

    [wallpaper.last]
    path = "/home/skykanin/Pictures/wallpapers/planets.jpg"
